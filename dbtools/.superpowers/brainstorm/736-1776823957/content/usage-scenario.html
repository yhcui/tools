<h2>这个工具的使用场景是？</h2>
<p class="subtitle">这将决定整体架构方向</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>本地开发工具</h3>
      <p>开发者本地使用，启动后浏览器访问，配置数据库连接后一键生成文档。不需要部署到服务器，不需要用户系统。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>团队共享工具</h3>
      <p>部署到内网服务器，团队成员都可以访问和使用。需要基本的用户权限管理，支持保存多个数据库配置。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>简单工具</h3>
      <p>最简版本：一个页面输入数据库信息，选择要导出的表，点击生成，下载 Word 文档。用完即走，不保存配置。</p>
    </div>
  </div>
</div>
