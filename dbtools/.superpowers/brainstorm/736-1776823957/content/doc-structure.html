<h2>Word 文档的整体结构？</h2>
<p class="subtitle">文档目录和表在文档中的呈现方式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>带目录 + 每个表一个章节</h3>
      <p>文档开头有目录/表清单，点击跳转到对应表的详细表格。每个表一个标题+表格。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>纯表格，无目录</h3>
      <p>文档就是表的集合，从上到下排列，简单直接。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>带封面 + 目录 + 表详情</h3>
      <p>封面页（项目名/生成时间）+ 目录页 + 每个表的详细表格 + 外键关系图</p>
    </div>
  </div>
</div>
